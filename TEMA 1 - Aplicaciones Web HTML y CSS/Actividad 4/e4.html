<body>
    <h1>Punto 1</h1>
    <h2>Distintos tamaños</h2>
        <img src="ET.png" alt="Escudo Ejercito de Tierra">
        <img width="25%" src="ET.png" alt="Escudo Ejercito de Tierra">
        <img width="50%" src="ET.png" alt="Escudo Ejercito de Tierra">
        <img width="300px" src="ET.png" alt="Escudo Ejercito de Tierra">

    <h1>Punto 2</h1>
    <h2>Imagen con título y enlazada a web</h2>
        <a href="https://ejercito.defensa.gob.es/">
            <figure>
                <img width="75%" src="sniper.jpg" alt="Francotirador">
                <figcaption>Francotiradores</figcaption>
            </figure>
        </a>
    
    <h1>Punto 3</h1>
       <h2>3 Imágenes con cambio de tamaño</h2>
    <picture>
        <source media="(min-width: 650px)" alt="HulkGrande" srcset="hulkgrande.png">
        <source media="(min-width: 465px)"  alt="MujerSniper" srcset="mujersniper.png">
        <img src="mujersoldado.png" alt="MujerSoldado" style="width: auto;">
    </picture>

    <h1>Punto 4</h1>
        <h2>Añadir icono a la web</h2>
            <link rel="icon" href="icon.png">

    <h1>Punto 5</h1>
        <h2>Insertar web dentro de una página web</h2>
            <iframe src="https://es.wikipedia.org/wiki/Ej%C3%A9rcito_de_Tierra_(Espa%C3%B1a)" width="75%" height="900px"></iframe>

    <h1>Punto 6</h1>
